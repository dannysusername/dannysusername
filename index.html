<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>JavaScript label example</title>
    <style>
      button {
        font-family: "helvetica neue", helvetica, sans-serif;
        letter-spacing: 1px;
        text-transform: uppercase;
        text-align: center;
        border: 2px solid rgb(200 200 0 / 0.6);
        background: rgba(0, 217, 217, 0.6);
        color: rgb(100 0 0 / 1);
        box-shadow: 1px 1px 2px rgb(0 0 200 / 0.4);
        border-radius: 10px;
        padding: 3px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
  <!-- First button for Player 1 -->
  <button type="button">Player 1: Chris</button>

  <!-- Second button with a custom attribute -->
  <button type2="button2">Create para.</button>

  <script>
    // Script for updating the name of the first button
    const playerButton = document.querySelector('button[type="button"]');

    playerButton.addEventListener("click", updateName);

    function updateName() {
      const name = prompt("Enter a new name");
      playerButton.textContent = `Player 1: ${name}`;
    }
  </script>

  <script>
    // Script for creating a paragraph when the second button is clicked
    function createParagraph() {
      const para = document.createElement("p");
      para.textContent = "You clicked the button!";
      document.body.appendChild(para);
    }

    // Select the second button using its custom attribute
    const createParaButton = document.querySelector('button[type2="button2"]');

    createParaButton.addEventListener("click", createParagraph);
  </script>
</body>

</html>
